<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockBlast</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar__container">

            <a href="/" id="navbar__logo">
                BLOCKBLAST
            </a>

            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <ul class="navbar__menu">

                <li class="navbar__item">
                    <a href="#" class="navbar__links">Home</a>
                </li>

                <li class="navbar__item">
                    <a href="#" class="navbar__links">Leaderboard</a>
                </li>

                <li class="navbar__item">
                    <a href="#" class="navbar__links">How To Play</a>
                </li>

                <li class="navbar__btn">
                    <a href="#" class="button">Play Now</a>
                </li>

            </ul>

        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <div class="hero__container">

            <!-- LEFT SIDE -->
            <div class="hero__content">

                <h1>Blast The Blocks.</h1>

                <p>
                    Clear rows. Build combos. Beat your high score.
                    A modern puzzle experience inspired by classic block games.
                </p>

                <a href="#" class="hero__button">
                    Start Playing
                </a>

            </div>

            <!-- RIGHT SIDE -->
            <div class="game-preview">

                <div class="game-board">

                    <!-- ROW 1 -->
                    <div class="cell filled"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>

                    <!-- ROW 2 -->
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>

                    <!-- ROW 3 -->
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>

                    <!-- ROW 4 -->
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>

                    <!-- ROW 5 -->
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>

                    <!-- ROW 6 -->
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>

                    <!-- ROW 7 -->
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>

                    <!-- ROW 8 -->
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell filled"></div>

                </div>

            </div>

        </div>

    </section>

    <!-- BLOCK SELECTION -->
    <section class="blocks">

        <!-- BLOCK 1 -->
        <div class="block-piece">

            <div class="block-cell active"></div>
            <div class="block-cell active"></div>
            <div class="block-cell active"></div>

            <div class="block-cell"></div>
            <div class="block-cell active"></div>
            <div class="block-cell"></div>

            <div class="block-cell"></div>
            <div class="block-cell active"></div>
            <div class="block-cell"></div>

        </div>

        <!-- BLOCK 2 -->
        <div class="block-piece">

            <div class="block-cell active"></div>
            <div class="block-cell active"></div>
            <div class="block-cell"></div>

            <div class="block-cell active"></div>
            <div class="block-cell"></div>
            <div class="block-cell"></div>

            <div class="block-cell active"></div>
            <div class="block-cell"></div>
            <div class="block-cell"></div>

        </div>

        <!-- BLOCK 3 -->
        <div class="block-piece">

            <div class="block-cell active"></div>
            <div class="block-cell active"></div>
            <div class="block-cell active"></div>

            <div class="block-cell active"></div>
            <div class="block-cell"></div>
            <div class="block-cell"></div>

            <div class="block-cell"></div>
            <div class="block-cell"></div>
            <div class="block-cell"></div>

        </div>

    </section>

    <!-- JAVASCRIPT -->
    <script>
        const menu = document.querySelector('#mobile-menu');
        const menuLinks = document.querySelector('.navbar__menu');

        menu.addEventListener('click', function () {
            menu.classList.toggle('is-active');
            menuLinks.classList.toggle('active');
        });
    </script>

</body>
</html>
