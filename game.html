<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BLOCKBLAST GAME</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <h1 class="title">BLOCKBLAST</h1>

    <div class="card">

</html>
